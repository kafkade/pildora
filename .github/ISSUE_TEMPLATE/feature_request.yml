name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

        **Note:** Features that require the server to access plaintext user health data
        are incompatible with Pildora's zero-knowledge architecture and will not be accepted.
  - type: textarea
    id: problem
    attributes:
      label: Is this related to a problem?
      description: A clear description of the problem this would solve
      placeholder: "I'm frustrated when..."
  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to happen
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives you've considered
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Pildora would this affect?
      options:
        - iOS / iPad app
        - Apple Watch app
        - Web app
        - CLI tool
        - Sync server
        - Encryption / crypto library
        - Drug data
        - Documentation
        - Not sure
  - type: dropdown
    id: phase
    attributes:
      label: Which roadmap phase does this relate to?
      description: See docs/roadmap.md for phase details
      options:
        - "Phase 0: Architecture & Crypto Foundation"
        - "Phase 1: Core MVP (iPhone)"
        - "Phase 2: Encrypted Cloud Sync"
        - "Phase 3: Data Enrichment"
        - "Phase 4: Multi-Platform Expansion"
        - "Phase 5: Vaults & Sharing"
        - "Phase 6: Intelligence Layer"
        - "Phase 7: Moonshots"
        - "Phase 8: Scale & Polish"
        - "Not sure"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, mockups, or screenshots

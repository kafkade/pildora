name: Bug Report
description: Report a bug in Pildora
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below to help us investigate.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Pildora is affected?
      options:
        - iOS / iPad app
        - Apple Watch app
        - Web app
        - CLI tool
        - Sync server
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version or commit hash
      placeholder: "0.1.0 or abc1234"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - iOS
        - iPadOS
        - watchOS
        - macOS (web/CLI)
        - Windows (web/CLI)
        - Linux (web/CLI)
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you observe?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Open the app
        2. Tap '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs or error messages (never include personal health data)
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help
